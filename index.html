<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro - Security Sensor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <section class="content-wrapper">
            <div class="image-container">
                <img src="imagem 1.jpeg" alt="Logotipo Security Sensor e informações">
            </div>

            <div class="form-container">
                <div class="form-content"> 
                    <h2>Cadastre-se</h2>
                    <p>Preencha os dados abaixo para continuar.</p>
                    
                    <form action="index2.html" method="GET">
                        <div class="input-group">
                            <label for="nome">Nome</label>
                            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
                        </div>

                        <div class="input-group">
                            <label for="whatsapp">WhatsApp</label>
                            <input type="tel" id="whatsapp" name="whatsapp" placeholder="(00) 00000-0000" onkeypress="mask(this, mphone);" onblur="mask(this, mphone);" required>
                        </div>

                        <div class="input-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                        </div>

                        <button type="submit" class="btn-enviar">Enviar Dados</button>
                    </form>

                    <div class="site-link-wrapper">
                        <a href="https://cbtecnologiars.com.br/turmaiot/Ronaldo/" target="_blank" class="link-site">Visite nosso Site</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer-copy">
        <p>&copy; Direitos autorais LFRP Web Solutions</p>
    </footer>

    <script src="java.js"></script>
</body>
</html>
